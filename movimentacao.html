<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movimentação de Estoque</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#0d6efd;
    color:#fff;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:900px;
    margin:30px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    margin-bottom:20px;
    color:#333;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input,select,textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    background:#198754;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#157347;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:30px;
}

table th{
    background:#0d6efd;
    color:white;
    padding:10px;
}

table td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.entrada{
    color:green;
    font-weight:bold;
}

.saida{
    color:red;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
<h1>Controle de Estoque</h1>
</header>

<div class="container">

<div class="card">

<h2>Movimentação de Produtos</h2>

<form id="formMovimentacao">

<div class="form-group">
<label>Produto</label>
<input type="text" id="produto" required>
</div>

<div class="form-group">
<label>Tipo de Movimentação</label>
<select id="tipo">
<option>Entrada</option>
<option>Saída</option>
</select>
</div>

<div class="form-group">
<label>Quantidade</label>
<input type="number" id="quantidade" min="1" required>
</div>

<div class="form-group">
<label>Data</label>
<input type="date" id="data" required>
</div>

<div class="form-group">
<label>Observação</label>
<textarea id="obs"></textarea>
</div>

<button type="submit">
Registrar Movimentação
</button>

</form>

<table id="tabela">
<thead>
<tr>
<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>
<th>Data</th>
<th>Observação</th>
</tr>
</thead>

<tbody>

</tbody>

</table>

</div>

</div>

<script>

const form = document.getElementById("formMovimentacao");
const tabela = document.querySelector("#tabela tbody");

form.addEventListener("submit", function(e){

e.preventDefault();

const produto = document.getElementById("produto").value;
const tipo = document.getElementById("tipo").value;
const quantidade = document.getElementById("quantidade").value;
const data = document.getElementById("data").value;
const obs = document.getElementById("obs").value;

let linha = tabela.insertRow();

linha.insertCell(0).innerHTML = produto;

if(tipo=="Entrada"){
    linha.insertCell(1).innerHTML="<span class='entrada'>Entrada</span>";
}else{
    linha.insertCell(1).innerHTML="<span class='saida'>Saída</span>";
}

linha.insertCell(2).innerHTML=quantidade;
linha.insertCell(3).innerHTML=data;
linha.insertCell(4).innerHTML=obs;

form.reset();

});

</script>

</body>
</html>
